<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aulas — AFFriend Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-100">

  <!-- SIDEBAR S3 (RESPONSIVO, BRANCO, PREMIUM) -->
<aside id="sidebar"
  class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl border-r border-gray-200 flex flex-col
         transition-transform duration-300 -translate-x-full md:translate-x-0 z-50">
  <div class="px-6 py-6 border-b border-gray-200 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-red-600">AFFriend</h1>
      <p class="text-gray-500 text-sm">Painel Administrativo</p>
    </div>
    <!-- Botão fechar (mobile) -->
    <button onclick="toggleSidebar()" class="md:hidden text-gray-600 text-2xl">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-1">
    <button onclick="go('dashboard.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-chart-line text-xl"></i>
      <span>Dashboard</span>
      </button>
      <p class="text-xs text-gray-400 uppercase mt-6 mb-2 px-4">Conteúdo</p>
      <button onclick="go('cursos.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-book text-xl"></i>
      <span>Cursos</span>
    </button>
    <button onclick="go('produtos.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-box text-xl"></i>
      <span>Produtos</span>
      </button>
      <button onclick="go('marketplace.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-store text-xl"></i>
      <span>Marketplace</span>
    </button>
    <p class="text-xs text-gray-400 uppercase mt-6 mb-2 px-4">Gestão</p>
     <button onclick="go('usuarios.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-users text-xl"></i>
      <span>Usuários</span>
    </button>
    <button onclick="go('notificacoes.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-bell text-xl"></i>
      <span>Notificações</span>
    </button>
    <button onclick="go('compras.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-credit-card text-xl"></i>
      <span>Compras</span>
      </button>
      <button onclick="go('admin-materiais.html')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-red-600 text-white transition">
        <i class="fa-solid fa-file text-xl"></i>
        <span>Materiais</span>
        </button>
       <button onclick="go('logs.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-file-lines text-xl"></i>
      <span>Logs</span>
    </button>
  </nav>
  <div class="px-6 py-4 border-t border-gray-200">
    <button onclick="logout()"
      class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg transition">
      Sair
    </button>
  </div>
</aside>
  <!-- NAVBAR RESPONSIVA PREMIUM -->
<header class="fixed top-0 left-0 md:left-64 right-0 h-16 bg-white shadow flex items-center justify-between px-4 md:px-8 border-b z-40">
  <!-- Botão Menu (Mobile) -->
  <button onclick="toggleSidebar()" class="md:hidden text-2xl text-gray-700">
    <i class="fa-solid fa-bars"></i>
  </button>
  <!-- Título da Página -->
  <h2 id="pageTitle" class="text-lg md:text-xl font-semibold text-gray-700">
    <!-- O JS pode alterar este título dinamicamente -->
  </h2>
  <!-- Perfil do Admin -->
  <div class="flex items-center gap-3">
    <i class="fas fa-user-circle text-3xl text-gray-600"></i>
    <span id="adminEmail" class="hidden sm:block text-gray-700 font-medium"></span>
  </div>
</header>
  <!-- CONTEÚDO -->
<main class="md:ml-64 mt-16 px-4 md:px-8 pb-10">
   <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-gray-800" id="courseTitle">Aulas</h1>
      <button onclick="location.href='criar-aula.html?curso='+courseId"
        class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg shadow transition">
        <i class="fa-solid fa-plus"></i> Criar Aula
      </button>
    </div>
    <!-- LISTA DE AULAS -->
    <div id="lessonsList" class="space-y-4">
      <p class="text-gray-500">Carregando aulas...</p>
    </div>
  </main>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <!-- Script da Lógica da página aulas. 
  Deve listar as aulas criadas pelo admin e os usuarios -->
<script>
  // Alternar sidebar (mobile)
  function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("-translate-x-full");
  }

  // Navegação
  function go(page) {
    window.location.href = page;
  }

  // Logout
  function logout() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  }

  // Obter courseId da URL
  const urlParams = new URLSearchParams(window.location.search);
  const courseId = urlParams.get("curso");

  // Definir título da página dinamicamente
  document.getElementById("pageTitle").textContent = "Aulas do Curso";

  // Exibir email do admin logado
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      document.getElementById("adminEmail").textContent = user.email;
      loadLessons();
    } else {
      window.location.href = "login.html";
    }
  });

  // Carregar aulas do curso
  function loadLessons() {
  const lessonsList = document.getElementById("lessonsList");
  lessonsList.innerHTML = `<p class="text-gray-500">Carregando aulas...</p>`;

  const db = firebase.database();
  db.ref(`courseLessons/${courseId}`).orderByChild("order").once("value", snapshot => {
    lessonsList.innerHTML = "";

    if (!snapshot.exists()) {
      lessonsList.innerHTML = `<p class="text-gray-500">Nenhuma aula encontrada.</p>`;
      return;
    }

    snapshot.forEach(child => {
      const lesson = child.val();
      const lessonId = child.key;

      const card = document.createElement("div");
      card.className = "bg-white shadow rounded-xl p-6 flex justify-between items-center";

      card.innerHTML = `
        <div>
          <h3 class="text-lg font-semibold text-gray-800">${lesson.order}. ${lesson.title}</h3>
          <p class="text-gray-600 text-sm">${lesson.description || ""}</p>
          <p class="text-xs text-gray-400 mt-1">
            Tipo: ${lesson.type} • 
            Duração: ${lesson.duration || "—"} • 
            Estado: ${lesson.status}
          </p>
        </div>
        <div class="flex gap-3">
          <a href="${lesson.type === "video" ? lesson.videoUrl : lesson.pdfUrl}" target="_blank"
            class="px-2 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm">
            <i class="fa-solid fa-link"></i> Abrir
          </a>
          <button onclick="editLesson('${lessonId}')"
            class="px-2 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm">
            <i class="fa-solid fa-pen"></i> Editar
          </button>
          <button onclick="deleteLesson('${lessonId}')"
            class="px-2 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm">
            <i class="fa-solid fa-trash"></i> Excluir
          </button>
        </div>
      `;

      lessonsList.appendChild(card);
    });
  });
}

  // Editar aula (redireciona para página de edição)
  function editLesson(lessonId) {
    window.location.href = `editar-aula.html?curso=${courseId}&aula=${lessonId}`;
  }

  // Excluir aula
  function deleteLesson(lessonId) {
    if (confirm("Tem certeza que deseja excluir esta aula?")) {
      const db = firebase.database();
      db.ref(`courseLessons/${courseId}/lessons/${lessonId}`).remove()
        .then(() => {
          alert("✅ Aula excluída com sucesso!");
          loadLessons();
        })
        .catch(error => {
          alert("❌ Erro ao excluir aula: " + error.message);
        });
    }
  }
</script>
</div>
</body>
</html>
