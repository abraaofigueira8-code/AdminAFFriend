<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar Curso — AFFriend Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>


<body class="bg-gray-100">

  <!-- SIDEBAR S3 (RESPONSIVO, BRANCO, PREMIUM) -->
<aside id="sidebar"
  class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl border-r border-gray-200 flex flex-col
         transition-transform duration-300 -translate-x-full md:translate-x-0 z-50">

  <div class="px-6 py-6 border-b border-gray-200 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-red-600">AFFriend</h1>
      <p class="text-gray-500 text-sm">Painel Administrativo</p>
    </div>

    <!-- Botão fechar (mobile) -->
    <button onclick="toggleSidebar()" class="md:hidden text-gray-600 text-2xl">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <nav class="flex-1 px-4 py-6 space-y-1">

    <button onclick="go('dashboard.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-chart-line text-xl"></i>
      <span>Dashboard</span>
    </button>

    <p class="text-xs text-gray-400 uppercase mt-6 mb-2 px-4">Conteúdo</p>

    <button onclick="go('cursos.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-book text-xl"></i>
      <span>Cursos</span>
    </button>

    <button onclick="go('produtos.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-box text-xl"></i>
      <span>Produtos</span>
    </button>

    <button onclick="go('marketplace.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-store text-xl"></i>
      <span>Marketplace</span>
    </button>

    <p class="text-xs text-gray-400 uppercase mt-6 mb-2 px-4">Gestão</p>

    <button onclick="go('usuarios.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-users text-xl"></i>
      <span>Usuários</span>
    </button>

    <button onclick="go('notificacoes.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-bell text-xl"></i>
      <span>Notificações</span>
    </button>

    <button onclick="go('compras.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-credit-card text-xl"></i>
      <span>Compras</span>
    </button>
    
      <button onclick="go('admin-materiais.html')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-red-600 text-white transition">
        <i class="fa-solid fa-file text-xl"></i>
        <span>Materiais</span>
      </button>
    
    <button onclick="go('logs.html')"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-gray-700 hover:bg-gray-100 transition">
      <i class="fa-solid fa-file-lines text-xl"></i>
      <span>Logs</span>
    </button>
  </nav>

  <div class="px-6 py-4 border-t border-gray-200">
    <button onclick="logout()"
      class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg transition">
      Sair
    </button>
  </div>

</aside>
  <!-- NAVBAR RESPONSIVA PREMIUM -->
<header class="fixed top-0 left-0 md:left-64 right-0 h-16 bg-white shadow flex items-center justify-between px-4 md:px-8 border-b z-40">

  <!-- Botão Menu (Mobile) -->
  <button onclick="toggleSidebar()" class="md:hidden text-2xl text-gray-700">
    <i class="fa-solid fa-bars"></i>
  </button>

  <!-- Título da Página -->
  <h2 id="pageTitle" class="text-lg md:text-xl font-semibold text-gray-700">
    <!-- O JS pode alterar este título dinamicamente -->
  </h2>

  <!-- Perfil do Admin -->
  <div class="flex items-center gap-3">
    <i class="fas fa-user-circle text-3xl text-gray-600"></i>
    <span id="adminEmail" class="hidden sm:block text-gray-700 font-medium"></span>
  </div>

</header>
  <!-- CONTEÚDO -->
<main class="md:ml-64 mt-16 px-4 md:px-8 pb-10">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Novo Curso</h1>
      <button onclick="history.back()"
        class="text-gray-600 hover:text-gray-900 flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>
    </div>

    <div class="bg-white shadow rounded-2xl p-8 max-w-3xl">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Título do Curso</label>
          <input id="title" type="text"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="Ex: Lógica de Programação para Iniciantes">
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
          <textarea id="description" rows="4"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="Descreva o conteúdo, objetivos e benefícios do curso."></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
          <input id="category" type="text"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="Ex: Programação, Matemática, Educação">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nível</label>
          <select id="level"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="iniciante">Iniciante</option>
            <option value="intermediario">Intermediário</option>
            <option value="avancado">Avançado</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Preço (Kz)</label>
          <input id="price" type="number" min="0"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="Ex: 5000">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Thumbnail (URL)</label>
          <input id="thumbnail" type="text"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="https://...">
        </div>

      </div>

      <div class="mt-8 flex justify-end gap-3">
        <button onclick="history.back()"
          class="px-5 py-3 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100">
          Cancelar
        </button>

        <button onclick="createCourse()"
          class="px-6 py-3 rounded-lg bg-red-600 hover:bg-red-700 text-white font-semibold">
          Criar Curso
        </button>
      </div>

    </div>

  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.auth().onAuthStateChanged(admin => {
      if (!admin) return window.location.href = "index.html";
      document.getElementById("adminEmail").textContent = admin.email;
    });

    async function createCourse() {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const category = document.getElementById("category").value.trim();
      const level = document.getElementById("level").value;
      const price = Number(document.getElementById("price").value || 0);
      const thumbnail = document.getElementById("thumbnail").value.trim();

      if (!title || !description) {
        alert("Preencha pelo menos título e descrição.");
        return;
      }

      const ref = firebase.database().ref("courses").push();
      const id = ref.key;

      await ref.set({
        id,
        title,
        description,
        category,
        level,
        price,
        thumbnail: thumbnail || "",
        createdAt: Date.now(),
        updatedAt: Date.now(),
        status: "draft"
      });

      alert("Curso criado com sucesso!");
      window.location.href = "cursos.html";
    }
  
   /*DASHBOARD*/
  function go(page) {
      window.location.href = page;
    }

    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
      });
    }
  
  //SIDEBAR
  function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("-translate-x-full");
}
  const titles = {
  "dashboard.html": "Dashboard",
  "cursos.html": "Cursos",
  "produtos.html": "Produtos",
  "marketplace.html": "Marketplace",
  "usuarios.html": "Usuários",
  "notificacoes.html": "Notificações",
  "compras.html": "Compras",
  "logs.html": "Logs",
  "configuracoes.html": "Configurações"
};

const page = location.pathname.split("/").pop();
document.getElementById("pageTitle").textContent = titles[page] || "Admin";

  </script>
</div>
</body>
</html>
