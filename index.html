<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — AFFriend Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">AFFriend Admin</h1>
      <p class="text-gray-500 mt-2">Acesso exclusivo para administradores</p>
    </div>

    <div class="relative">
    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <i class="fa-solid fa-envelope text-gray-500 absolute right-4 top-1/2 -translate-y-1/2"></i>
    <input id="email" type="email"
      class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-4 focus:ring-2 focus:ring-red-500"
      placeholder="admin@affriend.com">

    </div>
    <div class="relative">
    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
    <i class="fa-solid fa-lock text-gray-500 absolute right-4 top-1/2 -translate-y-1/2"></i>
    <input id="password" type="password"
      class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-6 focus:ring-2 focus:ring-red-500"
      placeholder="Senha">
    </div>
    <button onclick="loginAdmin()"
      class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-semibold text-lg shadow">
      Entrar
    </button>

    <p id="errorMsg" class="text-red-600 text-sm mt-4 text-center hidden"></p>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    async function loginAdmin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.classList.add("hidden");

      try {
        const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
        const user = userCred.user;

        // Verificar se é admin
        const snap = await firebase.database().ref("users/" + user.uid).once("value");
        const data = snap.val();

        if (!data || data.role !== "admin") {
          firebase.auth().signOut();
          errorMsg.textContent = "Acesso negado. Esta conta não é de administrador.";
          errorMsg.classList.remove("hidden");
          return;
        }

        // Redirecionar
        window.location.href = "dashboard.html";

      } catch (error) {
        errorMsg.textContent = "Email ou senha incorretos.";
        errorMsg.classList.remove("hidden");
      }
    }
  </script>

</body>
</html>
